<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px ; 
            padding: 0px;
        }
        .header{
            background: #ffc8dd;
            height: 100px; 
            width: 100%;
        }

        .nav-bar{
            display: flex;
            justify-content: end;
            padding: 30px;
            gap: 50px;
        }
        .btn{
            border: 2px solid rgb(172, 57, 76); 
            border-radius: 6px;
            padding: 10px 15px;
        }
        .btn:hover{
            cursor: pointer;
        }
        .preview-img {
            width: 200px;
            height: 200px;
            display: block;
            border: 2px solid gray;
        }
        .summary{
            padding: 20px; 
            height: 300px; 
            width: 300px; 
            border: 2px solid green;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="header">
    <nav class="nav-bar">
        <p id="login" class="btn">Login</p>
        <p id="details"class="btn">Details</p>
        <p id="logout"class="btn">LogOut</p>
        <p id="theme" class="btn">Theme</p>
    </nav>
    </div>
    <div class="main"></div>
    <script type="module" src="index.js"></script>
</body>
</html>
